spring.application.name=server-registry
server.port=${PORT:8761}

# 1. FIX: Remove 'https://' from here. Hostname only!
eureka.instance.hostname=serviceregistry-1-p6w0.onrender.com

# 2. Tell Eureka to use the hostname above for registration
eureka.instance.prefer-ip-address=false

# 3. Security: Render uses HTTPS, so tell Eureka to communicate over port 443
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=443

# 4. Standard Eureka Server settings
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.server.enable-self-preservation=false

# 5. The absolute URL for OTHER services to find this one
eureka.client.service-url.defaultZone=https://serviceregistry-1-p6w0.onrender.com/eureka/